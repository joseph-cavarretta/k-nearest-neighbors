services:
  api:
    build: .
    container_name: knn-api
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
